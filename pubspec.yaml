name: everyday
description: "每一天 - 节日计算器，生日/纪念日/节日管理与提醒"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.6

  # 数据库
  sqflite: ^2.3.2
  path: ^1.9.0

  # 通知
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2

  # 本地存储
  shared_preferences: ^2.2.2

  # 日期处理
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/
